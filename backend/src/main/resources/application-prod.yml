spring:
  jpa:
    show-sql: false
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

server:
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

logging:
  level:
    com.radhaproject: WARN
    org.springframework: WARN
  file:
    name: /var/log/radha-project/app.log
